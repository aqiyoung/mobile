name: Build iOS Debug

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-debug:
    runs-on: macos-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild (iOS)
        run: npx expo prebuild --platform ios --no-install --clean --non-interactive

      - name: List iOS files
        run: ls -la ios/

      - name: Build iOS (Debug, no signing)
        working-directory: ios
        run: |
          # Find the actual workspace name
          WORKSPACE=$(find . -name "*.xcworkspace" | head -1 | sed 's|^\./||')
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null | grep -A1 'Schemes:' | tail -1 | xargs)
          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-build
          path: ios/build/Build/Products/Debug-iphonesimulator/*.app
          if-no-files-found: error
